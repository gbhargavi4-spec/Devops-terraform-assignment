name: CI

on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  terraform-lint:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: terraform fmt check
        run: |
          find terraform/modules terraform/environments -name "*.tf" \
            -exec dirname {} \; | sort -u | while read dir; do
            terraform -chdir="$dir" fmt -check -recursive
          done

      - name: terraform validate (modules)
        run: |
          for module in terraform/modules/*/; do
            terraform -chdir="$module" init -backend=false -input=false
            terraform -chdir="$module" validate
          done

  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: application
          push: false
          tags: devops-app:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-app:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
