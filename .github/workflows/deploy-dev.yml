name: Deploy Dev

on:
  push:
    branches:
      - "feature/**"
      - develop

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ENVIRONMENT: dev

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: application
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/devops-app-${{ env.ENVIRONMENT }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/devops-app-${{ env.ENVIRONMENT }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-apply:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init & apply
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false \
            -var="github_org=${{ secrets.GH_ORG }}" \
            -var="github_repo=${{ github.event.repository.name }}"

  deploy-app:
    name: Deploy Application (dev)
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - terraform-apply
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=devops-app" \
                      "Name=tag:Environment,Values=dev" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Pull and restart via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ needs.build-and-push.outputs.ecr_registry }}\",
              \"docker pull ${{ needs.build-and-push.outputs.ecr_registry }}/devops-app-dev:${{ needs.build-and-push.outputs.image_tag }}\",
              \"docker tag ${{ needs.build-and-push.outputs.ecr_registry }}/devops-app-dev:${{ needs.build-and-push.outputs.image_tag }} ${{ needs.build-and-push.outputs.ecr_registry }}/devops-app-dev:latest\",
              \"systemctl restart app\"
            ]}" \
            --region ${{ env.AWS_REGION }}
